name: usb11_ice40

root:
  name: top
  deps:
    - nsl_hwdep.clock
    - nsl_hwdep.uid
    - nsl_hwdep.reset
    - nsl_hwdep.ice40
    - nsl_clocking.async
    - nsl_clocking.pll
    - nsl_memory.fifo
    - nsl_usb.usb
    - nsl_usb.utmi
    - nsl_usb.fs_phy
    - nsl_usb.func
    - nsl_usb.io
    - nsl_ftdi.ft245
    - nsl_bnoc.framed
    - nsl_spi.transactor
  sources:
    - file_type: vhdl
      files:
        - ../src/main.vhd
    - file_type: ice40-pcf
      files:
        - ../src/main.pcf

output:
  - name: pnr
    topcell: main
    target:
      part: up5k
      package: sg48
    backend_config:
      gbs.builtin.ghdl:
        vhdl_standard: "1993"
      gbs.builtin.yosys:
        tool: "yosys"
        steps:
          - flatten
          - tribuf -logic
          - deminout
      gbs.builtin.nextpnr:
        tool: "nextpnr-ice40"
      gbs.builtin.icepack:
        tool: "icepack"
    outputs:
      - type: ice40-bitstream
        path: usb11.bin
