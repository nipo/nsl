name: tang_25k_hdmi

root:
  name: top
  deps:
    - nsl_digilent.pmod
    - nsl_sipeed.pmod_dvi
    - nsl_sipeed.pmod_btn_4_4
    - nsl_clocking.async
    - nsl_clocking.distribution
    - nsl_event.tick
    - nsl_clocking.pll
    - nsl_dvi.transceiver
    - nsl_dvi.pattern
    - nsl_hdmi.audio
    - nsl_hdmi.encoder
    - nsl_hdmi.pattern
    - nsl_hwdep.clock
    - nsl_hwdep.reset
    - nsl_io.io
    - nsl_io.clock
    - nsl_io.diff
    - nsl_logic.bool
    - nsl_math.fixed
    - nsl_signal_generator.trigonometry
  sources:
    - file_type: vhdl
      files:
        - src/stage1_pll_mod.vhd
        - src/stage1_pll.vhd
        - src/hdmi_pll_mod.vhd
        - src/hdmi_pll.vhd
        - src/top.pkg.vhd
        - src/boundary.vhd
        - src/main.vhd
    - file_type: verilog
      files:
        - src/stage1_pll_init.v
        - src/hdmi_pll_init.v
    - file_type: gowin-cst
      files:
        - ../pinout/j4_pmod_single_lvcmos33d.cst
        - ../pinout/j5_pmod_double_lvcmos33_in.cst
        - ../pinout/done_led.cst
        - ../pinout/ready_led.cst
        - ../pinout/buttons.cst
        - ../pinout/clk.cst
    - file_type: gowin-sdc
      files:
        - ../pinout/clk.sdc
        - src/clocks.sdc

output:
  - name: synthesis
    topcell: boundary
    target:
      part: GW5A-LV25MG121NC1/I0#A
      use_as_gpio:
        - sspi
        - done
        - ready
        - cpu
    backend_config:
      gbs.builtin.gowin: {}
    outputs:
      - type: gowin-fs
        path: hdmi.fs
