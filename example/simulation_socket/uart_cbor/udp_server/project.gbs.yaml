name: uart_cbor_udp_server

root:
  name: top
  deps:
    - nsl_uart.transactor
    - nsl_uart.serdes
    - nsl_uart.testing
    - nsl_amba.axi4_stream
    - nsl_data.cbor
    - nsl_simulation.logging
    - nsl_simulation.driver
    - nsl_simulation.control
    - nsl_amba.stream_to_udp
    - nsl_amba.stream_fifo
    - nsl_data.bytestream
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    backend_config:
      gbs.builtin.ghdl: {}
    outputs:
      - type: ghdl-simulator
        path: tb
