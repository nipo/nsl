name: spi_cbor_udp_server

root:
  name: top
  deps:
    - nsl_spi.cbor_transactor
    - nsl_spi.spi
    - nsl_spi.slave
    - nsl_event.tick
    - nsl_simulation.driver
    - nsl_simulation.control
    - nsl_amba.axi4_mm
    - nsl_amba.ram
    - nsl_amba.stream_to_udp
    - nsl_amba.stream_fifo
    - nsl_data.bytestream
    - nsl_io.io
    - nsl_memory.ram
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    backend_config:
      gbs.builtin.ghdl: {}
    outputs:
      - type: ghdl-simulator
        path: tb
