name: uart_cbor_full_test

root:
  name: top
  deps:
    - nsl_uart.transactor
    - nsl_uart.serdes
    - nsl_uart.testing
    - nsl_amba.axi4_stream
    - nsl_data.cbor
    - nsl_simulation.logging
    - nsl_simulation.driver
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
