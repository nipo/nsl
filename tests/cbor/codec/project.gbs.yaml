name: cbor_codec

root:
  name: top
  deps:
    - nsl_data.bytestream
    - nsl_data.cbor
    - nsl_data.text
    - nsl_simulation.assertions
    - nsl_simulation.logging
    - nsl_simulation.driver
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
