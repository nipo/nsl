name: avalon_width_adapter

root:
  name: top
  deps:
    - nsl_data.bytestream
    - nsl_data.prbs
    - nsl_data.text
    - nsl_math.arith
    - nsl_logic.bool
    - nsl_simulation.assertions
    - nsl_simulation.control
    - nsl_simulation.driver
    - nsl_simulation.logging
    - nsl_avalon.avalon_st
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
