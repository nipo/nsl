name: tmds

root:
  name: top
  deps:
    - nsl_simulation.driver
    - nsl_simulation.assertions
    - nsl_clocking.async
    - nsl_line_coding.tmds
    - nsl_data.prbs
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
