name: mesochronous

root:
  name: top
  deps:
    - nsl_math.gray
    - nsl_simulation.driver
    - nsl_simulation.assertions
    - nsl_clocking.async
    - nsl_clocking.interdomain
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
