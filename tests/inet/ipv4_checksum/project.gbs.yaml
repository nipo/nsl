name: inet_ipv4_checksum

root:
  name: top
  deps:
    - nsl_simulation.driver
    - nsl_bnoc.framed
    - nsl_bnoc.testing
    - nsl_inet.ethernet
    - nsl_inet.ipv4
    - nsl_inet.udp
    - nsl_inet.testing
    - nsl_clocking.async
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
