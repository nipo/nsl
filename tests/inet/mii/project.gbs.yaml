name: inet_mii

root:
  name: top
  deps:
    - nsl_simulation.driver
    - nsl_mii.mii
    - nsl_mii.rgmii
    - nsl_mii.testing
    - nsl_bnoc.committed
    - nsl_clocking.async
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
