name: inet_ethernet

root:
  name: top
  deps:
    - nsl_inet.ethernet
    - nsl_mii.link_monitor
    - nsl_mii.rgmii
    - nsl_mii.testing
    - nsl_data.text
    - nsl_data.bytestream
    - nsl_bnoc.testing
    - nsl_simulation.driver
    - nsl_simulation.assertions
  sources:
    - file_type: vhdl
      files:
        - src/root.pkg.vhd
        - src/tb.vhd
        - src/dut.vhd

output:
  - name: simulation
    topcell: tb
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
