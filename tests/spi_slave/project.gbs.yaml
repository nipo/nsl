name: spi_slave

root:
  name: top
  deps:
    - nsl_spi.slave
    - nsl_data.bytestream
    - nsl_data.text
    - nsl_simulation.driver
    - nsl_simulation.assertions
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
