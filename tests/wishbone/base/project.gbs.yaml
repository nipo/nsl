name: wishbone_base

root:
  name: top
  deps:
    - nsl_wishbone.wishbone
    - nsl_wishbone.testing
    - nsl_wishbone.crossbar
    - nsl_wishbone.memory
    - nsl_data.text
    - nsl_simulation.driver
    - nsl_simulation.assertions
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
