name: amba_axi4_mm_types

root:
  name: top
  deps:
    - nsl_data.bytestream
    - nsl_data.endian
    - nsl_data.crc
    - nsl_data.text
    - nsl_data.prbs
    - nsl_simulation.assertions
    - nsl_simulation.logging
    - nsl_amba.axi4_mm
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    outputs:
      - type: simulation-log
        path: simulation.log
