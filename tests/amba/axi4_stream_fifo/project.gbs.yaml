name: amba_axi4_stream_fifo

root:
  name: top
  deps:
    - nsl_data.bytestream
    - nsl_data.endian
    - nsl_data.crc
    - nsl_data.prbs
    - nsl_data.text
    - nsl_simulation.assertions
    - nsl_simulation.driver
    - nsl_simulation.logging
    - nsl_amba.axi4_stream
    - nsl_amba.stream_fifo
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
