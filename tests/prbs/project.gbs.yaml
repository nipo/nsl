name: prbs

root:
  name: top
  deps:
    - nsl_data.bytestream
    - nsl_data.endian
    - nsl_data.prbs
    - nsl_data.text
    - nsl_simulation.assertions
    - nsl_simulation.logging
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    outputs:
      - type: simulation-log
        path: simulation.log
