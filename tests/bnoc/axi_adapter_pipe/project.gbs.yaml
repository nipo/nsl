name: bnoc_axi_adapter_pipe

root:
  name: top
  deps:
    - nsl_bnoc.pipe
    - nsl_bnoc.testing
    - nsl_bnoc.axi_adapter
    - nsl_amba.axi4_stream
    - nsl_data.bytestream
    - nsl_simulation.logging
    - nsl_simulation.driver
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
