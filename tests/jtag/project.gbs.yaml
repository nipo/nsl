name: jtag

root:
  name: top
  deps:
    - nsl_jtag.jtag
    - nsl_jtag.transactor
    - nsl_jtag.tap
    - nsl_simulation.driver
    - nsl_bnoc.framed
    - nsl_bnoc.routed
    - nsl_bnoc.testing
    - nsl_clocking.async
    - nsl_data.bytestream
    - nsl_data.endian
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
