name: clock_rate_estimator

root:
  name: top
  deps:
    - nsl_clocking.interdomain
    - nsl_simulation.driver
    - nsl_simulation.assertions
    - nsl_data.text
  sources:
    - file_type: vhdl
      files:
        - src/tb.vhd

output:
  - name: simulation
    topcell: tb
    filter_vars:
      hwdep: simulation
    backend_config:
      gbs.builtin.ghdl:
        success_regex: "Terminating with error level: 0"
    outputs:
      - type: simulation-log
        path: simulation.log
