name: tests

# Runs the GBS test suite inside the pre-built nsl-ci container.

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:

jobs:
  suite:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/${{ github.repository_owner }}/nsl-ci:latest

    # publish-unit-test-result-action needs write access to Checks and PRs
    # to render results in the PR Checks tab.
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Run GBS test suite
        working-directory: tests
        run: gbs suite build

      - name: Upload JUnit + per-project logs
        # Skip under act: upload-artifact@v4 talks to the GitHub-hosted
        # artifact service and needs ACTIONS_RUNTIME_TOKEN which act doesn't
        # mint. Real CI sets that env automatically.
        if: always() && !env.ACT
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/test-results/
          if-no-files-found: error

      - name: Publish JUnit to the Checks tab
        # Skip under act: the Checks API requires a real GitHub App token
        # which act cannot mint. Real CI sets ACT to "false" (undefined).
        if: always() && !env.ACT
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          junit_files: tests/test-results/junit.xml
