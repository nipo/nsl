name: tests

# Runs the GBS test suite inside the pre-built nsl-ci container.

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:

jobs:
  wait-for-image:
    # If this same push also triggered ci-image (Dockerfile or plugin change),
    # block until that build finishes so we don't try to pull :latest before
    # it's been republished. No-op for pushes that don't touch the image
    # inputs.
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Wait for ci-image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          for _ in $(seq 1 60); do
            running=$(gh run list --repo "$REPO" \
              --workflow=ci-image.yml --commit="$SHA" --status=in_progress \
              --json databaseId --jq 'length')
            queued=$(gh run list --repo "$REPO" \
              --workflow=ci-image.yml --commit="$SHA" --status=queued \
              --json databaseId --jq 'length')
            if [ "$running" = "0" ] && [ "$queued" = "0" ]; then
              echo "No ci-image build pending for $SHA"
              exit 0
            fi
            echo "ci-image still running for $SHA; sleeping 15s"
            sleep 15
          done
          echo "Gave up waiting for ci-image after 15 min"
          exit 1

  suite:
    needs: wait-for-image
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/${{ github.repository_owner }}/nsl-ci:latest

    # publish-unit-test-result-action needs write access to Checks and PRs
    # to render results in the PR Checks tab.
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Seed gbs user config
        # GH Actions overrides HOME to /github/home in container jobs, hiding
        # the /root/.config/gbs.yaml the image baked in. Copy it into the
        # runtime HOME so gbs picks up the analyze/elaborate/run flags.
        run: |
          mkdir -p "$HOME/.config"
          cp /root/.config/gbs.yaml "$HOME/.config/gbs.yaml"

      - name: Run GBS test suite
        working-directory: tests
        run: gbs suite build

      - name: Upload JUnit + per-project logs
        # Skip under act: upload-artifact@v4 talks to the GitHub-hosted
        # artifact service and needs ACTIONS_RUNTIME_TOKEN which act doesn't
        # mint. Real CI sets that env automatically.
        if: always() && !env.ACT
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/test-results/
          if-no-files-found: error

      - name: Publish JUnit to the Checks tab
        # Skip under act: the Checks API requires a real GitHub App token
        # which act cannot mint. Real CI sets ACT to "false" (undefined).
        if: always() && !env.ACT
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          junit_files: tests/test-results/junit.xml
